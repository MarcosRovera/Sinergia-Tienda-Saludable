<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="conteiner">
        <div class="content firts-content"> <!-- Primera parte -->
            <div class="firts-column">
                <h2 class="title  title-Primary">Hola de nuevo!</h2>
                <p class="description description-primary">Por favor, ingresa tus credenciales para continuar.</p>
                <a href="login.html" class="btn btn-primary">Iniciar sesión</a>

                <img src="logo.png" alt="Logo" class="logo">

            </div>
            <div class="second-column">
                <h2 class="title title-second">Crear cuenta</h2>
                <p class="description description-second">¿No tienes una cuenta?</p>
                <p class="description description-second">Usa tu email para crear una.</p>
                <form  class="form">
                    <label for="label-input">
                        <input type="text" placeholder="Nombre">
                    </label>
                    <label for="label-input">
                        <input type="text"  placeholder="Apellido">
                    </label>
                    <label for="label-input">
                        <input type="date" placeholder="Fecha de nacimiento">
                    </label>
                    <label for="label-input">
                        <input type="email"  placeholder="Correo electrónico">
                    </label>
                    <label for="label-input">
                        <input type="password"  placeholder="Contraseña">
                    </label>
                </form>
                <button class="btn btn-second">Crear cuenta</button>
            </div>
            
        </div>   
    </div>
</body>
</html>
