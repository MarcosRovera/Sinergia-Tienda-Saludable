<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="conteiner">
        <div class="content second-content"> <!-- Segunda parte -->
                <div class="firts-column">
                    <h2 class="title title-Primary">Hola Amigo!</h2>
                    <p class="description description-primary">Ingresa tus datos perosnales para registrarte</p>
                    
                    <a href="register.html" class="btn btn-primary">Registrarse</a>
                    <img src="logo.png" alt="Logo" class="logo">
                </div>
                <div class="second-column">
                    <h2 class="title title-second">Iniciar sesión</h2>
                    <p class="description description-second">Usa tu cuanta de email</p>
                    <form  class="form">
                        <input type="email" placeholder="Correo electrónico">
                        <input type="password" placeholder="Contraseña">
                        
                    </form>
                    <a href="index.html" class="btn btn-second">Iniciar sesión</a>
                    
                </div>
            </div>
        </div>
    </div>
</body>
</html>
